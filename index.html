<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      var theme = localStorage.getItem('theme')
      var dark = theme === 'dark' || (!theme && matchMedia('(prefers-color-scheme: dark)').matches)
      document.documentElement.dataset.theme = dark ? 'dark' : 'light'
    </script>
    <link rel="icon" href="/icon.webp" sizes="any" type="image/webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Free hosting for Flarum, MediaWiki, and WordPress" />
    <title>no-cost.site</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
